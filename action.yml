# CodeRepute composite action: build the CLI from this action's own pinned
# source, produce report.html, convert it to report.pdf with headless Chromium,
# attest both files independently with Sigstore/OIDC, and upload as artifacts.
#
# The calling workflow MUST grant:
#
#   permissions:
#     contents: read
#     pull-requests: read   # default-token runs: the CLI lists PRs
#     id-token: write       # OIDC identity for Sigstore signing
#     attestations: write   # store the attestation on the repository
#
# Pin this action to a tagged version (gkanitz/CodeRepute@vX.Y.Z).
# See docs/verification.md for what the attestation proves and how
# consumers verify it.
name: CodeRepute Report
description: >-
  Generate a verified developer collaboration report from GitHub metadata
  and attest report.html + report.pdf with Sigstore.
author: gkanitz

branding:
  icon: activity
  color: blue

inputs:
  repos:
    description: >-
      Repositories to cover, owner/name (comma-separated for several).
      Required unless org is set.
    required: false
    default: ''
  org:
    description: >-
      GitHub organisation to cover — every repository visible to the token.
      Alternative to repos; do not set both.
    required: false
    default: ''
  subject:
    description: GitHub username the report is about.
    required: true
  token:
    description: GitHub token used to read repository metadata.
    required: false
    default: ${{ github.token }}
  window-days:
    description: Report window ending now, in days.
    required: false
    default: "365"
  out:
    description: Output directory for report.json and report.html.
    required: false
    default: coderepute-report
  attest:
    description: >-
      Attest report.html and report.pdf with actions/attest-build-provenance.
      Requires id-token:write and attestations:write. Set "false" to skip (the
      report then stays useful but is not independently verifiable).
    required: false
    default: "true"
  artifact-name:
    description: Name of the uploaded workflow artifact.
    required: false
    default: coderepute-report

outputs:
  report-html:
    description: Path to the generated report.html (contains embedded report JSON).
    value: ${{ steps.generate.outputs.report-html }}
  report-pdf:
    description: Path to the generated report.pdf.
    value: ${{ steps.pdf.outputs.report-pdf }}
  attestation-url:
    description: URL of the stored attestation (empty when attest=false).
    value: ${{ steps.attest.outputs.attestation-url }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: false

    - name: Build coderepute from the pinned action source
      shell: bash
      working-directory: ${{ github.action_path }}
      run: go build -trimpath -o "$RUNNER_TEMP/coderepute" ./cmd/coderepute

    - name: Generate report
      id: generate
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        CR_ORG: ${{ inputs.org }}
        CR_REPOS: ${{ inputs.repos }}
        CR_SUBJECT: ${{ inputs.subject }}
        CR_WINDOW_DAYS: ${{ inputs.window-days }}
        CR_OUT: ${{ inputs.out }}
      run: |
        if [ -n "$CR_ORG" ]; then
          "$RUNNER_TEMP/coderepute" \
            -org "$CR_ORG" \
            -subject "$CR_SUBJECT" \
            -window-days "$CR_WINDOW_DAYS" \
            -out "$CR_OUT"
        else
          "$RUNNER_TEMP/coderepute" \
            -repo "$CR_REPOS" \
            -subject "$CR_SUBJECT" \
            -window-days "$CR_WINDOW_DAYS" \
            -out "$CR_OUT"
        fi
        echo "report-html=$CR_OUT/report.html" >> "$GITHUB_OUTPUT"

    - name: Generate PDF from report HTML
      id: pdf
      if: ${{ inputs.attest == 'true' }}
      shell: bash
      env:
        CR_OUT: ${{ inputs.out }}
      run: |
        google-chrome --headless --disable-gpu --no-sandbox \
          --print-to-pdf="$CR_OUT/report.pdf" \
          --print-to-pdf-no-header \
          "file://$(realpath "$CR_OUT/report.html")"
        echo "report-pdf=$CR_OUT/report.pdf" >> "$GITHUB_OUTPUT"

    - name: Attest report.html and report.pdf
      id: attest
      if: ${{ inputs.attest == 'true' }}
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: |
          ${{ steps.generate.outputs.report-html }}
          ${{ steps.pdf.outputs.report-pdf }}

    - name: Upload report artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.out }}
        if-no-files-found: error
